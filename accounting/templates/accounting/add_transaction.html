<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Add Transaction</title>
<script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-gray-100">
<div class="max-w-3xl mx-auto mt-10 bg-white p-8 rounded-xl shadow">
<h1 class="text-3xl font-bold mb-6 text-blue-600">Add Transaction</h1>
<form method="post">
{% csrf_token %}
{{ form.as_p }}
<button class="bg-blue-600 text-white px-5 py-2 rounded">Save Transaction</button>
<a href="{% url 'categorize_transactions' %}" class="ml-3 bg-green-600 text-white px-5 py-2 rounded">Categorize</a>
<a href="{% url 'generate_gst_report' %}" class="ml-3 bg-purple-600 text-white px-5 py-2 rounded">GST Report</a>
</form>
{% if gst_amount %}
<div class="mt-6 p-4 bg-green-100 rounded">
GST Calculated: <strong>₹ {{ gst_amount }}</strong>
</div>
{% endif %}
</div>
</body>
</html>
